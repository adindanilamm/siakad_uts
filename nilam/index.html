<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Grading Dashboard - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-layout">
  
  <div class="auth-card">
    <div class="flex flex-col items-center mb-6">
      <div class="logo-box mb-4">L</div>
      <h1 class="text-xl font-bold mb-1">Welcome Back</h1>
      <p class="text-xs text-muted">Sign in to access your learning evaluation system.</p>
    </div>

    <!-- Role Tabs -->
    <div class="role-tabs mb-6" id="role-tabs">
      <div class="role-tab active" data-role="lecturer" onclick="selectRole('lecturer')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        Lecturer
      </div>
      <div class="role-tab" data-role="student" onclick="selectRole('student')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path></svg>
        Student
      </div>
    </div>

    <!-- Login Form -->
    <form action="dashboard.html" method="GET">
      <div class="form-group mb-4">
        <label class="form-label">Username</label>
        <div class="input-container">
          <div class="input-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </div>
          <input type="text" class="form-control" placeholder="Enter your username" required>
        </div>
      </div>

      <div class="form-group mb-6">
        <div class="form-label">
          <span>Password</span>
          <a href="#" class="text-xs">Forgot password?</a>
        </div>
        <div class="input-container">
          <div class="input-icon">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7z"></path></svg>
          </div>
          <input type="password" class="form-control" placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full">Sign In</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
